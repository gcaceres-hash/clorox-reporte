:root {
  color-scheme: light;
  --navy: #1C2B3A;
  --navy-light: #2b3f54;
  --accent: #3ab6a8;
  --accent-dark: #2c9184;
  --green: #1a8a4c;
  --amber: #b3720b;
  --red: #c8341f;
  --gray: #8b93a3;
  --clorox: #2f6fed;
  --softy: #e0663f;
}
* { box-sizing: border-box; }
body {

}
.wrap { max-width: 1180px; margin: 0 auto; padding: 0 24px 32px; }
.hero {

  color: #fff; padding: 28px 24px 34px; margin-bottom: -18px;
}
.hero-inner { max-width: 1180px; margin: 0 auto; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 14px; }
.hero-title { display: flex; align-items: center; gap: 12px; }
.hero-logo {
  width: 40px; height: 40px; border-radius: 10px; background: var(--accent);
  display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; color: #0d221e;
  flex-shrink: 0; transition: background .15s;
}
h1 { font-size: 21px; margin: 0; font-weight: 700; letter-spacing: -0.01em; }
.eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #9fb0c3; margin-bottom: 2px; }
.subtitle { color: #b8c4d1; font-size: 12.5px; margin-top: 4px; }
.hero-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
input#search {
  padding: 9px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.18);
  font-size: 13px; width: 200px; background: rgba(255,255,255,0.08); color: #fff;
}
input#search::placeholder { color: #9fb0c3; }
input#search:focus { outline: none; border-color: var(--accent); background: rgba(255,255,255,0.14); }
.switch {
  display: flex; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18);
  border-radius: 10px; padding: 3px; gap: 3px;
}
.switch button {
  border: none; background: transparent; color: #cfd8e3; font-size: 13px; font-weight: 700;
  padding: 8px 18px; border-radius: 7px; cursor: pointer; transition: all .15s;
}
.switch button.active.clorox-active { background: var(--clorox); color: #fff; }
.switch button.active.softy-active { background: var(--softy); color: #fff; }
.switch button:not(.active):hover { background: rgba(255,255,255,0.08); color: #fff; }
.content { position: relative; padding-top: 22px; }
.warn-banner { background: #fff6e5; border: 1px solid #f2ddab; color: #7a5a10; border-radius: 8px; padding: 10px 14px; font-size: 12.5px; margin-bottom: 12px; }
.info-banner { background: #eef6ff; border: 1px solid #d7e8fb; color: #1c4c78; border-radius: 8px; padding: 10px 14px; font-size: 12.5px; margin-bottom: 18px; }
.grid-top { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; margin-bottom: 20px; }
.card { background: #fff; border-radius: 12px; padding: 16px 18px; box-shadow: 0 2px 8px rgba(28,43,58,0.07); border: 1px solid #eceef2; border-top: 3px solid var(--gray); }
.card.st-green { border-top-color: var(--green); }
.card.st-amber { border-top-color: var(--amber); }
.card.st-red { border-top-color: var(--red); }
.card .label { font-size: 11.5px; color: #767a82; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; font-weight: 600; }
.card .value { font-size: 23px; font-weight: 800; color: var(--navy); }
.card .value.green { color: var(--green); }
.card .value.red { color: var(--red); }
.card .value.amber { color: var(--amber); }
.card .sub { font-size: 11px; color: #9aa0a8; margin-top: 3px; }
.mvp-card {
  background: linear-gradient(135deg, #fff9ec 0%, #fff 100%); border: 1px solid #f2ddab;
  border-radius: 12px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
}
.mvp-trophy { font-size: 30px; }
.mvp-title { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: #8a6d10; font-weight: 700; }
.mvp-name { font-size: 17px; font-weight: 800; color: var(--navy); }
.mvp-detail { font-size: 12.5px; color: #767a82; margin-left: auto; text-align: right; }
.main-row { display: grid; grid-template-columns: 1.6fr 1fr; gap: 16px; margin-bottom: 20px; }
@media (max-width: 800px) { .main-row { grid-template-columns: 1fr; } .hero-inner { align-items: flex-start; } input#search { width: 100%; } .mvp-card{flex-wrap:wrap;} .mvp-detail{margin-left:0; text-align:left;} }
.panel { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 2px 8px rgba(28,43,58,0.07); border: 1px solid #eceef2; }
.panel h2 { font-size: 14px; margin: 0 0 14px 0; color: var(--navy); font-weight: 700; }
.clock-wrap { display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; }
.clock-num { text-align: center; }
.clock-num .n { font-size: 38px; font-weight: 800; line-height: 1; color: var(--navy); }
.clock-num .l { font-size: 11.5px; color: #767a82; margin-top: 6px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 9px 10px; color: #767a82; font-weight: 700; font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; border-bottom: 2px solid #eef0f3; cursor: pointer; user-select: none; }
th:hover { color: var(--navy); }
td { padding: 11px 10px; border-bottom: 1px solid #f1f2f4; vertical-align: middle; }
tr.vendor-row { cursor: pointer; transition: background .1s; }
tr.vendor-row:hover { background: #f6f8fa; }
tr.vendor-row.top1 { background: #fffaf0; }
.dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 7px; }
.dot.green { background: var(--green); } .dot.amber { background: var(--amber); } .dot.red { background: var(--red); } .dot.gray { background: #b7bcc4; }
.chev { display: inline-block; transition: transform .15s; color: #b0b6bf; }
.chev.open { transform: rotate(90deg); color: var(--accent-dark); }
.detail-row td { background: #f8fafb; padding: 0; }
.detail-inner { padding: 16px 20px 20px 20px; display: none; border-left: 3px solid var(--accent); }
.detail-inner.open { display: block; }
.detail-inner table { margin-top: 8px; }
.detail-inner th, .detail-inner td { font-size: 12.5px; }
.help-box { background: #eef6ff; border: 1px solid #d7e8fb; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 10px; }
.help-box.ok { background: #eafaf0; border-color: #cdeedc; }
.help-box.warn { background: #fff6e5; border-color: #f2ddab; }
.right { text-align: right; }
.mono { font-variant-numeric: tabular-nums; }
.tag { display: inline-block; font-size: 11px; color: #767a82; background: #f1f2f4; padding: 2px 8px; border-radius: 10px; margin-left: 6px; }
.pill { font-size: 10.5px; padding: 2px 8px; border-radius: 10px; background: #eef1f4; color: #56606c; margin-left: 6px; font-weight: 600; }
.pill.gold { background: #fdeec4; color: #8a6d10; }
footer { text-align: center; color: #9aa0a8; font-size: 11px; margin-top: 28px; }
.catrow { display: grid; grid-template-columns: 1fr auto; gap: 4px 10px; font-size: 12px; margin: 4px 0 2px 0; align-items: baseline; }
.catbar-bg { background: #eef0f3; border-radius: 6px; height: 8px; overflow: hidden; margin-bottom: 8px; position: relative; }
.catbar-fill { height: 100%; background: var(--accent); }
.catbar-obj { position: absolute; top: -2px; bottom: -2px; width: 2px; background: #56606c; }
</style>

<script>
const DATA = JSON.parse(document.getElementById('report-data').textContent);
let empresaActual = 'clorox';

function fmtMoney(v) {
  if (v === null || v === undefined) return '—';
  return '$' + Math.round(v).toLocaleString('es-AR');
}
function fmtPct(v) {
  if (v === null || v === undefined) return '—';
  return (v * 100).toFixed(1) + '%';
}
function statusClass(v) {
  return v || 'gray';
}

function setEmpresa(cod) {
  empresaActual = cod;
  document.getElementById('btnClorox').classList.toggle('active', cod === 'clorox');
  document.getElementById('btnSofty').classList.toggle('active', cod === 'softy');
  document.getElementById('switch').querySelector('#btnClorox').classList.toggle('clorox-active', cod === 'clorox');
  document.getElementById('switch').querySelector('#btnSofty').classList.toggle('softy-active', cod === 'softy');
  document.getElementById('heroLogo').textContent = cod === 'clorox' ? 'C' : 'S';
  document.getElementById('heroLogo').style.background = cod === 'clorox' ? '#2f6fed' : '#e0663f';
  document.getElementById('eyebrow').textContent = cod === 'clorox'
    ? 'Panel de ventas · Grupo Ayudín / Clorox'
    : 'Panel de ventas · Softys Argentina';
  renderEmpresa();
}
document.getElementById('btnClorox').addEventListener('click', () => setEmpresa('clorox'));
document.getElementById('btnSofty').addEventListener('click', () => setEmpresa('softy'));

const fechaDatos = DATA.fecha_datos_al ? new Date(DATA.fecha_datos_al + 'T00:00:00').toLocaleDateString('es-AR') : '—';
document.getElementById('subtitle').textContent =
  'Generado ' + new Date(DATA.generado).toLocaleString('es-AR') +
  ' · Venta real actualizada al ' + fechaDatos + ' (fuente: ' + (DATA.fuente_ventas || '—') + ')';

let sortKey = 'ranking', sortAsc = true;

function categoryRows(v) {
  const cats = v.categorias.slice().sort((a, b) => (b.objetivo || b.real || 0) - (a.objetivo || a.real || 0));
  const maxVal = Math.max(1, ...cats.map(c => Math.max(c.real || 0, c.objetivo || 0)));
  return cats.map(c => {
    const pctReal = ((c.real || 0) / maxVal) * 100;
    const pctObj = c.objetivo ? ((c.objetivo || 0) / maxVal) * 100 : null;
    const avanceCat = c.objetivo ? (c.real / c.objetivo * 100).toFixed(0) + '%' : 'sin objetivo';
    return `<div class="catrow"><span>${c.categoria}</span><span class="mono">${fmtMoney(c.real)}${c.objetivo ? ' / ' + fmtMoney(c.objetivo) : ''} (${avanceCat})</span></div>
      <div class="catbar-bg"><div class="catbar-fill" style="width:${pctReal}%"></div>${pctObj !== null ? `<div class="catbar-obj" style="left:${pctObj}%"></div>` : ''}</div>`;
  }).join('');
}

function vendorDetail(v, e) {
  let helpMsg, helpCls;
  if (v.objetivo === null || v.objetivo === undefined) {
    helpMsg = '⚠️ Este vendedor todavía no tiene objetivo cargado — no se puede calcular el avance ni cuánto le falta.';
    helpCls = 'warn';
  } else {
    const falta = (v.objetivo || 0) - (v.real || 0);
    const cumplido = falta <= 0;
    if (cumplido) {
      helpMsg = `✅ Ya alcanzó el objetivo total (superó por ${fmtMoney(-falta)}).`;
      helpCls = 'ok';
    } else {
      const restantes = e.dias_habiles_restantes;
      const porDiaNecesario = (restantes > 0) ? falta / restantes : 0;
      helpMsg = `Necesita vender <b>${fmtMoney(porDiaNecesario)}/día</b> en los próximos <b>${restantes}</b> días hábiles para llegar al objetivo (le faltan ${fmtMoney(falta)}).`;
      helpCls = '';
    }
  }
  return `
    <div class="help-box ${helpCls}">${helpMsg}</div>
    <div style="font-size:12px;color:#767a82;margin-bottom:10px;">Supervisor: ${v.supervisor || '—'} · Código: ${v.codigo} · Promedio diario actual: <b>${fmtMoney(v.promedio_diario)}</b></div>
    ${v.titular_cambio ? `<div class="help-box warn">ℹ️ El objetivo de este código (${v.codigo}) está cargado a nombre de <b>${v.objetivo_titular_excel}</b> en el Excel de objetivos. Se está usando igual porque el objetivo pertenece al puesto/ruta, no a la persona.</div>` : ''}
    ${v.objetivo_celda_no_coincide ? `<div class="help-box warn">⚠️ El total de objetivo cargado a mano para este código no coincidía con la suma de sus categorías en el Excel original — se usó la suma de categorías (más confiable). Conviene revisar ese renglón en la planilla fuente.</div>` : ''}
    <div style="font-weight:600;font-size:12.5px;margin-bottom:6px;">Objetivo vs. real por categoría <span style="font-weight:400;color:#9aa0a8;">(la marca gris es el objetivo de esa categoría)</span></div>
    ${categoryRows(v)}
  `;
}

function renderEmpresa() {
  const e = DATA.empresas[empresaActual];

  const sinObj = e.vendedores_sin_objetivo || [];
  document.getElementById('warnBanner').innerHTML = sinObj.length
    ? `<div class="warn-banner">⚠️ ${sinObj.length} vendedor(es) sin objetivo cargado todavía: ${sinObj.join(', ')}.</div>` : '';

  const anomalos = e.vendedores.filter(v => v.objetivo_celda_no_coincide).map(v => v.nombre);
  document.getElementById('infoBanner').innerHTML = anomalos.length
    ? `<div class="info-banner">ℹ️ Se detectó una inconsistencia en la planilla de objetivos para: <b>${anomalos.join(', ')}</b> (el total cargado a mano no coincidía con la suma de categorías). Se usó la suma de categorías. Conviene revisar esos renglones en el Excel fuente.</div>` : '';

  const kpis = document.getElementById('kpis');
  kpis.innerHTML = '';
  const t = e.totales;
  const kpiDefs = [
    ['Objetivo total', fmtMoney(t.objetivo), ''],
    ['Real (Facturación)', fmtMoney(t.real), statusClass(t.semaforo)],
    ['Estimado al cierre', fmtMoney(t.estimado_cierre), statusClass(t.semaforo)],
    ['Avance %', fmtPct(t.avance_pct), statusClass(t.semaforo)],
    ['Clientes con compra', t.clientes_con_compra.toLocaleString('es-AR'), ''],
  ];
  const cardStatusMap = { green: 'st-green', amber: 'st-amber', red: 'st-red', gray: '' };
  kpiDefs.forEach(([label, value, cls, sub]) => {
    const div = document.createElement('div');
    div.className = 'card ' + (cardStatusMap[cls] || '');
    div.innerHTML = `<div class="label">${label}</div><div class="value ${cls}">${value}</div>${sub ? `<div class="sub">${sub}</div>` : ''}`;
    kpis.appendChild(div);
  });

  const mvpDiv = document.getElementById('mvp');
  const mvp = e.vendedores.find(v => v.codigo === e.mejor_vendedor_codigo);
  mvpDiv.innerHTML = mvp ? `
    <div class="mvp-card">
      <div class="mvp-trophy">🏆</div>
      <div>
        <div class="mvp-title">Mejor vendedor · ${e.label}</div>
        <div class="mvp-name">${mvp.nombre}</div>
      </div>
      <div class="mvp-detail">
        Avance <b>${fmtPct(mvp.avance_pct)}</b> del objetivo<br>
        ${fmtMoney(mvp.real)} facturados · ${mvp.clientes_con_compra} clientes con compra
      </div>
    </div>` : '';

  const bars = document.getElementById('bars');
  const maxVal = Math.max(t.objetivo, t.real, t.estimado_cierre) || 1;
  function bar(label, val, color) {
    const pct = Math.min(100, (val / maxVal) * 100);
    return `<div style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;">
        <span>${label}</span><span class="mono">${fmtMoney(val)}</span>
      </div>
      <div style="background:#eef0f3;border-radius:6px;height:10px;overflow:hidden;">
        <div style="width:${pct}%;background:${color};height:100%;"></div>
      </div>
    </div>`;
  }
  const colorMap = { green: '#1a8a4c', amber: '#b3720b', red: '#c8341f', gray: '#8b93a3' };
  bars.innerHTML =
    bar('Objetivo', t.objetivo, '#8b93a3') +
    bar('Real', t.real, colorMap[t.semaforo] || '#8b93a3') +
    bar('Estimado al cierre', t.estimado_cierre, '#3ab6a8');

  const clock = document.getElementById('clock');
  const restantes = e.dias_habiles_restantes;
  const totales = e.dias_habiles_totales;
  const transcurridos = e.dias_habiles_transcurridos;
  const frac = totales ? transcurridos / totales : 0;
  const R = 54, C = 2 * Math.PI * R;
  const dash = C * frac;
  clock.innerHTML = `
    <svg width="140" height="140" viewBox="0 0 140 140">
      <circle cx="70" cy="70" r="${R}" fill="none" stroke="#eef0f3" stroke-width="14"/>
      <circle cx="70" cy="70" r="${R}" fill="none" stroke="#3ab6a8" stroke-width="14"
        stroke-dasharray="${dash} ${C - dash}" stroke-linecap="round"
        transform="rotate(-90 70 70)"/>
      <text x="70" y="66" text-anchor="middle" font-size="30" font-weight="800" fill="#1C2B3A">${restantes}</text>
      <text x="70" y="86" text-anchor="middle" font-size="10" fill="#767a82">restantes</text>
    </svg>
    <div class="clock-num"><div class="n">${transcurridos}</div><div class="l">días hábiles<br>transcurridos</div></div>
    <div class="clock-num"><div class="n">${totales}</div><div class="l">días hábiles<br>en el mes</div></div>
  `;

  render();
}

function render() {
  const e = DATA.empresas[empresaActual];
  const tbody = document.getElementById('tbody');
  const q = document.getElementById('search').value.trim().toLowerCase();
  let rows = e.vendedores.filter(v => v.nombre && v.nombre.toLowerCase().includes(q));
  const keyFn = {
    ranking: v => v.ranking,
    nombre: v => v.nombre || '',
    objetivo: v => v.objetivo || 0,
    real: v => v.real || 0,
    avance: v => (v.avance_pct === null || v.avance_pct === undefined) ? -1 : v.avance_pct,
    clientes: v => v.clientes_con_compra || 0,
  }[sortKey];
  rows = rows.slice().sort((a, b) => (keyFn(a) > keyFn(b) ? 1 : -1) * (sortAsc ? 1 : -1));

  tbody.innerHTML = '';
  rows.forEach(v => {
    const cls = statusClass(v.semaforo);
    const tr = document.createElement('tr');
    tr.className = 'vendor-row' + (v.codigo === e.mejor_vendedor_codigo ? ' top1' : '');
    tr.innerHTML = `
      <td>${v.ranking}</td>
      <td><span class="dot ${cls}"></span>${v.nombre}${v.codigo === e.mejor_vendedor_codigo ? '<span class="pill gold">🏆 mejor vendedor</span>' : ''}${v.objetivo === null ? '<span class="pill">sin objetivo</span>' : ''}${v.titular_cambio ? '<span class="pill" title="El objetivo de este código lo tenía cargado ' + v.objetivo_titular_excel + '">objetivo heredado</span>' : ''}</td>
      <td class="right mono">${fmtMoney(v.objetivo)}</td>
      <td class="right mono">${fmtMoney(v.real)}</td>
      <td class="right mono">${fmtPct(v.avance_pct)}</td>
      <td class="right mono">${v.clientes_con_compra}</td>
      <td class="right"><span class="chev">▶</span></td>
    `;
    const detailTr = document.createElement('tr');
    detailTr.className = 'detail-row';
    const td = document.createElement('td');
    td.colSpan = 7;
    const inner = document.createElement('div');
    inner.className = 'detail-inner';
    inner.innerHTML = vendorDetail(v, e);
    td.appendChild(inner);
    detailTr.appendChild(td);

    tr.addEventListener('click', () => {
      inner.classList.toggle('open');
      tr.querySelector('.chev').classList.toggle('open');
    });
    tbody.appendChild(tr);
    tbody.appendChild(detailTr);
  });
}

document.querySelectorAll('th[data-k]').forEach(th => {
  th.addEventListener('click', () => {
    const k = th.dataset.k;
    if (sortKey === k) sortAsc = !sortAsc; else { sortKey = k; sortAsc = true; }
    render();
  });
});
document.getElementById('search').addEventListener('input', render);

document.getElementById('footer').textContent =
  'Se actualiza automáticamente a partir del CSV de ventas y de la planilla de objetivos cargados en la carpeta Supervisor. Equipo de ' + DATA.equipo_codigos.length + ' vendedores.';

setEmpresa('clorox');
</script>
</body>
</html>
